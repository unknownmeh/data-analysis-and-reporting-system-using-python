<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Analysis Report</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #777;
            font-size: 16px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .card h2 {
            margin-top: 0;
            font-size: 22px;
            border-left: 5px solid #4e73df;
            padding-left: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            overflow-x: auto;
        }

        table th, table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        table th {
            background-color: #4e73df;
            color: white;
            font-weight: 600;
        }

        table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        img {
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            max-width: 100%;
            height: auto;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 26px;
            }

            .card h2 {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📊 Data Analysis Report</h1>
        <p>Automated Analytics & Statistical Summary</p>
    </div>

    <div class="card">
        <h2>Summary Statistics</h2>
        {{ summary_table | safe }}
    </div>

    <div class="card">
        <h2>Correlation Matrix</h2>
        {{ correlation_table | safe }}
    </div>

    <div class="card">
        <h2>Correlation Heatmap</h2>
        <img src="{{ heatmap }}">
    </div>

    <div class="footer">
        Generated automatically by Python Data Analysis Pipeline
    </div>

</div>

</body>
</html>
